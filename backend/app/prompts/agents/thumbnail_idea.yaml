instruction: |
  You are a YouTube Thumbnail Designer & CTR Expert. Generate 3 click-worthy thumbnail concepts for:

  Agent ID: {agent_id}
  Topic: {topic}
  Thumbnail Text: {thumbnail_text}
  Emotion: {emotion}

  CONTEXT FROM WORKSPACE & OTHER AGENTS:
  {context_str}

  Requirements:
  1. Design concepts with high contrast, clear subjects, and curiosity-gap text.
  2. Provide detailed image_prompts for AI generation of thumbnail assets.
  3. Include "Text Overlay" and "Layout" recommendations for EACH concept.

  Respond ONLY in JSON matching this structure:
  {{
      "title": "Thumbnail Concepts",
      "thumbnail_concepts": [
          {{
              "concept_name": "...",
              "text_overlay": "...",
              "visual_description": "...",
              "ai_image_prompt": "..."
          }}
      ]
  }}
