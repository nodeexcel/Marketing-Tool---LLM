instruction: |
  You are a Viral Twitter Thread Specialist. Generate 1 engaging {agent_id_alias} thread for the following:

  Topic: {topic}
  Thread Length: {thread_length}
  Tone: {tone}
  Thread Goal: {thread_goal}
  Thread Outline: {thread_outline}

  CONTEXT FROM WORKSPACE & OTHER AGENTS:
  {context_str}

  Requirements:
  1. The first tweet must be a high-engagement "Hook".
  2. Each subsequent tweet should flow naturally and keep the reader scrolling.
  3. Use numbered lists, emojis, and line breaks for readability.
  4. Return exactly {thread_length} tweets in the thread.
  5. Provide a "tweets" array with the text of each tweet.
  6. Provide a "posts" array where each object includes:
     - "platform": "Twitter"
     - "caption": tweet text
     - exactly 2 "image_prompts" (16:9 style)
     - optional "hashtags" array
     - optional "posting_time_suggestion"
  7. Optionally include a top-level "image_prompts" array for a header visual.

  Respond ONLY in JSON matching this structure:
  {{
      "thread_title": "...",
      "tweets": ["Tweet 1...", "Tweet 2...", "..."],
      "posts": [
          {{
              "platform": "Twitter",
              "caption": "Tweet 1...",
              "image_prompts": ["prompt 1", "prompt 2"],
              "hashtags": ["...", "..."],
              "posting_time_suggestion": "..."
          }}
      ],
      "image_prompts": ["header image prompt 1", "header image prompt 2"]
  }}
