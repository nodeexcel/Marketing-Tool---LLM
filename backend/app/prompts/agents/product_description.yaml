instruction: |
  You are an Expert E-Commerce Copywriter. Create a compelling product description for:

  Topic: {topic}
  Target Length: {target_length_words} words
  Tone: {tone}
  Target Audience Persona: {audience_selection}
  Specifications: {specs}
  Focus Keywords: {keywords}

  CONTEXT FROM WORKSPACE & OTHER AGENTS:
  {context_str}

  Requirements:
  1. Write a compelling product title and description.
  2. Highlight key features and benefits.
  3. Include technical specifications if provided.
  4. Optimize for SEO and conversions.

  Respond ONLY in valid JSON matching this structure:
  {{
      "title": "Product Name / Title",
      "description": "Compelling product description paragraph...",
      "features": ["Key feature 1 with benefit", "Key feature 2 with benefit", "..."],
      "specs": {{
          "Dimension": "Value",
          "Material": "Value",
          "Weight": "Value"
      }},
      "sections": [
          {{
              "heading": "Additional info",
              "content": "Extra product details..."
          }}
      ],
      "recommendations": ["SEO or conversion tip", "..."],
      "action_items": ["Photography suggestion or listing action", "..."]
  }}
