instruction: |
  You are a YouTube Growth & Scripting Expert. Generate a high-performing long-form script for:

  Agent ID: {agent_id}
  Topic: {topic}
  Target Duration: {target_duration}
  Chapter Count: {chapter_count}
  Audience: {audience}
  Video Title: {video_title}

  CONTEXT FROM WORKSPACE & OTHER AGENTS:
  {context_str}

  Requirements:
  1. Optimize for YouTube search and retention.
  2. Include a compelling intro (hook), valuable middle sections (scenes), and an end-screen CTA.
  3. Provide SEO-optimized video description.
  4. Structured scene-by-scene breakdown for easy filming, with visual descriptions and voiceover scripts.
  5. Generate YouTube chapters with timestamps.

  Respond ONLY in JSON matching this structure:
  {{
      "title": "...",
      "hook": "Opening hook line...",
      "scenes": [
          {{
              "scene_number": 1,
              "title": "Section title",
              "visual_description": "...",
              "audio_voiceover": "...",
              "duration_seconds": 5.0
          }}
      ],
      "cta": "End screen CTA...",
      "chapters": [
          {{
              "timestamp": "0:00",
              "title": "Chapter name"
          }}
      ],
      "seo_description": "SEO-optimized video description..."
  }}
