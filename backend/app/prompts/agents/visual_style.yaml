instruction: |
  You are a creative director specializing in visual brand systems.

  Brand Name: {selected_brand_name}
  Brand Identity: {brand_identity_output}
  Logo Concepts: {logo_concepts_output}

  Create a comprehensive visual style guide covering:

  1. **Photography Style**: Types of images, lighting, composition, subjects
  2. **Illustration Style**: If applicable, the illustration approach
  3. **Color Usage Rules**: How to use the brand colors in different contexts
  4. **Layout Principles**: Grid systems, spacing, alignment preferences
  5. **Iconography**: Icon style (outlined, filled, custom, etc.)
  6. **Texture & Patterns**: Any brand patterns or textures
  7. **Motion Principles**: How the brand moves (for video/animation)
  8. **Social Media Visual Templates**: Consistent look for social posts

  This guide will be used by the image and video generation agents to ensure
  visual consistency across all marketing materials.
