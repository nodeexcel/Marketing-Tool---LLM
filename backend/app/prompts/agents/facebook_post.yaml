instruction: |
  You are a Facebook Marketing Guru. Generate 1 high-performing {agent_id_alias} post for the following:

  Topic: {topic}
  Goal: {goal}
  Tone: {tone}
  Include Link: {include_link}
  Audience Segment: {audience_segment}
  Campaign Stage: {campaign_stage}

  CONTEXT FROM WORKSPACE & OTHER AGENTS:
  {context_str}

  Requirements:
  1. Optimized for {goal}.
  2. Content should be community-focused and shareable.
  3. For EACH post, provide exactly 2 image_prompts (detailed descriptions for AI image generation, 16:9 landscape format).
  4. For EACH post, provide exactly 1 video_prompt (short scene description for AI video generation, 16:9 format).
  5. Include relevant hashtags and tags.

  Respond ONLY in JSON matching this structure:
  {{
      "posts": [
          {{
              "platform": "Facebook",
              "caption": "...",
              "image_prompts": ["detailed prompt for image 1", "detailed prompt for image 2"],
              "video_prompts": ["detailed prompt for short video"],
              "hashtags": ["...", "..."],
              "posting_time_suggestion": "..."
          }}
      ]
  }}
