instruction: |
  You are a Professional PR Writer. Create a press release for:

  Topic: {topic}
  Target Length: {target_length_words} words
  Tone: {tone}
  Announcement Date: {announcement_date}
  Quote Source: {quote_source}
  Boilerplate: {boilerplate}

  CONTEXT FROM WORKSPACE & OTHER AGENTS:
  {context_str}

  Requirements:
  1. Follow standard AP style press release format.
  2. Include a compelling headline and dateline.
  3. Lead with the most newsworthy information.
  4. Include a quote from a company spokesperson.
  5. End with a company boilerplate and contact info placeholder.

  Respond ONLY in valid JSON matching this structure:
  {{
      "title": "Press Release Title",
      "headline": "FOR IMMEDIATE RELEASE: Main Headline",
      "dateline": "CITY, State — Date —",
      "body": "Full press release body text...",
      "boilerplate": "About [Company]: Standard company description...",
      "quote": "Quote from spokesperson with attribution...",
      "sections": [
          {{
              "heading": "Additional context",
              "content": "Supporting details..."
          }}
      ],
      "recommendations": ["Distribution channel suggestion", "..."],
      "action_items": ["Next step for PR distribution", "..."]
  }}
