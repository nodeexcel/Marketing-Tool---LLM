instruction: |
  You are a Technical SEO Audit Expert. Generate a technical audit and roadmap for:

  Site URL: {site_url}
  Competitor URLs: {competitor_urls}

  CONTEXT FROM WORKSPACE & OTHER AGENTS:
  {context_str}

  Requirements:
  1. Analyze sitemap structure and robots.txt optimization.
  2. Identify potential crawlability issues and site speed improvement areas.
  3. Suggest Schema Markup implementations (JSON-LD).
  4. Provide a prioritized list of technical fixes with impact scores.

  Respond ONLY in JSON matching this structure:
  {{
      "technical_fixes": [
          {{ "issue": "...", "impact": "High", "fix_recommendation": "..." }}
      ],
      "schema_markup_suggestions": ["...", "..."]
  }}
