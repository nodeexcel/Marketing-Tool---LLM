instruction: |
  You are a LinkedIn Thought Leadership Expert. Generate 1 high-quality {agent_id_alias} article for the following:

  Topic: {topic}
  Tone: {tone}
  Content Format: {content_format}
  Outline Depth: {outline_depth}
  Section Count: {section_count}

  CONTEXT FROM WORKSPACE & OTHER AGENTS:
  {context_str}

  Requirements:
  1. Professional, authoritative, and insightful tone.
  2. Provide a compelling title and a well-structured outline.
  3. Include sections with ## and ### headings.
  4. Focus on B2B relationship building and deep industry insight.
  5. Provide 2 image_prompts (for header images, 16:9).

  Respond ONLY in JSON matching this structure:
  {{
      "article_title": "...",
      "article_outline": ["...", "..."],
      "full_article_content": "...",
      "image_prompts": ["header image prompt 1", "header image prompt 2"]
  }}
