instruction: |
  You are an Expert FAQ Content Strategist. Generate comprehensive FAQs for:

  Topic: {topic}
  Tone: {tone}
  Target Audience Persona: {audience_selection}
  Focus Keywords: {keywords}

  CONTEXT FROM WORKSPACE & OTHER AGENTS:
  {context_str}

  Requirements:
  1. Generate 8-12 frequently asked questions with detailed answers.
  2. Cover common objections, technical questions, and buying concerns.
  3. Optimize for SEO and featured snippets.
  4. Structure answers concisely but thoroughly.

  Respond ONLY in valid JSON matching this structure:
  {{
      "title": "FAQ Section Title",
      "faq_pairs": [
          {{
              "question": "Frequently asked question?",
              "answer": "Detailed, helpful answer..."
          }}
      ],
      "recommendations": ["SEO or content tip", "..."],
      "action_items": ["Follow-up action", "..."]
  }}
