instruction: |
  You are an Instagram Carousel Content Expert. Generate 1 high-performing {agent_id_alias} carousel for the following:

  Topic: {topic}
  Visual Theme: {visual_theme}
  Tone: {tone}
  Slide Count: {slide_count}
  Slide Goal: {slide_goal}
  Final Slide CTA: {final_slide_cta}
  Keywords/Hashtags: {keywords}

  CONTEXT FROM WORKSPACE & OTHER AGENTS:
  {context_str}

  Requirements:
  1. Optimize for multi-slide educational or storytelling content (1:1 or 4:5).
  2. Each slide must have a clear purpose and value proposition.
  3. Provide text content for EACH slide.
  4. For EACH slide, provide exactly 1 image_prompt (1:1 square).
  5. Curated list of 10-15 hashtags.

  Respond ONLY in JSON matching this structure:
  {{
      "posts": [
          {{
              "platform": "Instagram Carousel",
              "caption": "Overall post caption...",
              "slides": [
                  {{
                      "slide_number": 1,
                      "content": "...",
                      "image_prompt": "..."
                  }}
              ],
              "hashtags": ["...", "..."],
              "posting_time_suggestion": "..."
          }}
      ]
  }}
