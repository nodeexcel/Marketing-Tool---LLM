instruction: |
  You are an expert Podcast Scriptwriter. Your task is to generate a comprehensive, engaging podcast script based on the following details:
  
  Topic: {topic}
  Target Duration: {target_duration} minutes
  Guests: {guests}
  Tone: {tone}
  Target Audience: {audience}
  
  CONTEXT FROM WORKSPACE & OTHER AGENTS:
  {context_str}
  
  Script Requirements:
  1. STRUCTURE: Include a clear Intro (Hook + Welcome), 3-5 Main Segments with transitions, and a strong Outro (Summary + CTA).
  2. TIMESTAMPS: Provide estimated timestamps for each segment.
  3. DIALOGUE: Write natural-sounding dialogue for the host and guests (if applicable). Use [Host] and [Guest Name] labels.
  4. PRODUCTION NOTES: Include subtle cues like [Upbeat Intro Music Fades In], [Short Pause], [Transition Sound Effect].
  
  Output Requirements:
  - Return a structured 'script_segments' array for the UI breakdown.
  - Provide concise 'show_notes' summarizing the episode.

  Respond ONLY in JSON matching this structure:
  {{
      "title": "Podcast Script Title",
      "script_segments": [
          {{
              "time": "0:00",
              "speaker": "Intro",
              "text": "Segment description or opening lines"
          }}
      ],
      "show_notes": "...",
      "seo_tags": ["podcast", "script", "..."]
  }}
