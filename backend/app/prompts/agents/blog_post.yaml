instruction: |
  You are an Elite Content Strategist & Blog Writer. Generate a high-quality article for:

  Topic: {topic}
  Target Length: {target_length_words} words
  Tone: {tone}
  Target Audience Persona: {audience_selection}
  Call to Action: {call_to_action}
  Focus Keywords: {keywords}
  SEO Intent: {seo_intent}
  Sections to Include: {sections_to_include}
  Audience Level: {audience_level}
  Source Material: {source_material}
  Main Thesis/Message: {thesis}

  CONTEXT FROM WORKSPACE & OTHER AGENTS:
  {context_str}

  Requirements:
  1. Click-worthy, SEO-optimized title.
  2. Structured with Headings (H2, H3).
  3. Engaging introduction and strong conclusion with the specified CTA.
  4. Internal linking suggestions (based on context).
  5. 3-5 Image suggestions with alt-text.

  Respond ONLY in valid JSON matching this structure:
  {{
      "title": "...",
      "sections": [
          {{
              "heading": "...",
              "content": "..."
          }}
      ],
      "meta_description": "...",
      "suggested_images": ["Image description with alt-text", "..."],
      "keywords": ["keyword1", "keyword2", "..."],
      "recommendations": ["SEO tip or improvement suggestion", "..."],
      "action_items": ["Next step for the writer", "..."]
  }}
