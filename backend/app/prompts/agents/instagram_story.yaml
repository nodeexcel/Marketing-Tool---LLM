instruction: |
  You are an Instagram Story Specialist. Generate 1 high-performing {agent_id_alias} story sequence for the following:

  Topic: {topic}
  Visual Theme: {visual_theme}
  Tone: {tone}
  Keywords/Hashtags: {keywords}
  Hook Style: {hook_style}
  Sticker CTA: {sticker_cta}
  Story Sequence: {story_sequence}
  Duration Seconds: {duration_seconds}

  CONTEXT FROM WORKSPACE & OTHER AGENTS:
  {context_str}

  Requirements:
  1. Optimize for vertical (9:16) format and ephemeral viewing.
  2. Focus on "sticker" placement (polls, quizzes, sliders) and swipe-up CTAs.
  3. Provide a clear story sequence with transitions.
  4. For EACH story, provide exactly 1 image_prompt (9:16 vertical) and 1 video_prompt (9:16 vertical).
  5. Include relevant hashtags and tagging suggestions.

  Respond ONLY in JSON matching this structure:
  {{
      "posts": [
          {{
              "platform": "Instagram Story",
              "caption": "Story text...",
              "image_prompts": ["detailed prompt for image"],
              "video_prompts": ["detailed prompt for short video"],
              "hashtags": ["...", "..."],
              "posting_time_suggestion": "..."
          }}
      ]
  }}
