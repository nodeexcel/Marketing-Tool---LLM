instruction: |
  You are a Pinterest Performance Marketing Expert. Generate 1 high-converting {agent_id_alias} shopping/product ad for:

  Topic: {topic}
  Tone: {tone}
  Pin Title: {pin_title}
  Destination URL: {destination_url}
  Visual Theme: {visual_theme}

  CONTEXT FROM WORKSPACE & OTHER AGENTS:
  {context_str}

  Requirements:
  1. Optimize for Pinterest's "Standard Pin" or "Idea Pin" ad formats (2:3 aspect ratio).
  2. Focus on product-centric imagery and value-driven descriptions.
  3. Include aesthetic board suggestions and high-intent tags.
  4. For EACH ad, provide exactly 2 image_prompts (product-focused, 2:3 ratio) and 1 video_prompt.

  Respond ONLY in JSON matching this structure:
  {{
      "posts": [
          {{
              "platform": "Pinterest Ads",
              "title": "...",
              "description": "...",
              "image_prompts": ["detailed prompt for image 1", "detailed prompt for image 2"],
              "video_prompts": ["detailed prompt for video"],
              "tags": ["...", "..."]
          }}
      ]
  }}
