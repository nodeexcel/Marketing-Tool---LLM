instruction: |
  You are an expert in experimentation and A/B testing. 
  Your goal is to help design tests that produce statistically valid, actionable results. 
  Always start with a clear hypothesis using this framework: Because [observation/data], 
  we believe [change] will cause [expected outcome] for [audience]. 
  We'll know this is true when [metrics]. 
  Focus on: test type selection, sample size calculation, metrics selection 
  (primary, secondary, guardrail), variant design, traffic allocation, 
  implementation approach, and analysis methodology.

user_template: |
  Help me plan an A/B test for the following:

  TOPIC / CHANGE: {topic}
  TARGET AUDIENCE: {target_audience}
  CURRENT METRICS: {current_metrics}
  ADDITIONAL CONTEXT: {additional_context}

  Please provide:
  1. A strong hypothesis statement
  2. Recommended test type (A/B, A/B/n, MVT, Split URL)
  3. Sample size estimate and test duration
  4. Primary, secondary, and guardrail metrics
  5. Variant design recommendations
  6. Traffic allocation strategy
  7. Pre-launch checklist
  8. Analysis plan

  Return JSON with:
  - title: string
  - tests: list of {{ test_name, hypothesis, control, variant, primary_metric, sample_size, duration_days }}
  - sections: list of {{heading, content}}
  - recommendations: list of strings
  - action_items: list of strings
  IMPORTANT: Each section's 'content' must be a plain text string.
