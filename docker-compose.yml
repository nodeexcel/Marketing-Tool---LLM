services:
  backend:
    image: python:3.11
    container_name: marketing_tool_backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "20154:8002"
    env_file:
      - ./backend/.env
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      BACKEND_PUBLIC_URL: http://116.202.210.102:20154
    command: >
      sh -c "python -m pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8002"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8002/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
